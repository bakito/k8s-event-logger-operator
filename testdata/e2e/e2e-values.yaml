image:
  repository: k8s-event-logger
  tag: e2e
  pullPolicy: IfNotPresent

securityContext: &securityContext
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: [ "ALL" ]

eventLogger:
  securityContext: *securityContext

webhook:
  enabled: true
